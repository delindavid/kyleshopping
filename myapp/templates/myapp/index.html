{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome | Kyle</title>

<style>
body{
    background-color:#C1D8C3;
    margin:0;
    padding:20px;
}

h1{
    font-size:60px;
    text-align:center;
    margin-top:40px;
}

h2{
    text-align:center;
    font-size:20px;
}

img{
    width:250px;
    display:block;
    margin:20px auto;
}

form{
    max-width:350px;
    margin:auto;
}

input, button{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#98D8EF;
    border:none;
}

/* MOBILE */
@media(max-width:600px){
    h1{font-size:35px;}
    img{width:180px;}
}
</style>
</head>

<body>

<h1>Welcome to Kyle</h1>
<h2>a women's destiny</h2>

<img src="{% static 'myapp/images/access.png' %}">

<form method="post">
{% csrf_token %}
<input type="email" name="email" placeholder="Email">
<input type="password" name="password" placeholder="Password">
<button type="submit">Login</button>
</form>

</body>
</html>

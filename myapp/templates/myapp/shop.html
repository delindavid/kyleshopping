{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#C1D8C3;}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#628141;
    color:white;
}

.container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    text-align:center;
}

img{width:100%;height:200px;object-fit:cover;}

/* MOBILE */
@media(max-width:768px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div>KYLE</div>
    <div>Cart 🛒</div>
</div>

<div class="container">

<div class="box">
<a href="{% url 'shop1' %}">
<img src="{% static 'myapp/images/jewelery.png' %}">
</a>
<p>Jeweleries</p>
</div>

<div class="box">
<img src="{% static 'myapp/images/watch.png' %}">
<p>Watches</p>
</div>

<div class="box">
<img src="{% static 'myapp/images/heels.png' %}">
<p>Footwears</p>
</div>

</div>

</body>
</html>

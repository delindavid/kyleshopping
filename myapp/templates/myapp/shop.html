{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#C1D8C3;font-family:Arial;}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#628141;
    color:white;
}

.nav-links a{
    color:white;
    margin-left:15px;
    text-decoration:none;
}

.container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.box{
    background:white;
    padding:15px;
    text-align:center;
    border-radius:10px;
}

img{
    width:100%;
    height:180px;
    object-fit:cover;
}

a{color:black;text-decoration:none;font-weight:bold;}

/* MOBILE */
@media(max-width:768px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div>KYLE SHOPPING</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Cart 🛒</a>
        <a href="#">Profile 👤</a>
    </div>
</div>

<div class="container">

<div class="box">
<a href="{% url 'shop1' %}">
<img src="{% static 'myapp/images/jewelery.png' %}">
</a>
<p>Jeweleries</p>
</div>

<div class="box">
<img src="{% static 'myapp/images/watch.png' %}">
<p>Watches</p>
</div>

<div class="box">
<img src="{% static 'myapp/images/heels.png' %}">
<p>Footwears</p>
</div>

<div class="box">
<img src="{% static 'myapp/images/sunglass.png' %}">
<p>Sunglasses</p>
</div>

<div class="box">
<img src="{% static 'myapp/images/hairclips.png' %}">
<p>Hairclips</p>
</div>

<div class="box">
<img src="{% static 'myapp/images/perfume.png' %}">
<p>Perfumes</p>
</div>

</div>

</body>
</html>

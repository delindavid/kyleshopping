{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#C1D8C3;}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#628141;
    color:white;
}

.container{
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    margin-bottom:20px;
    display:flex;
    gap:20px;
}

img{
    width:200px;
    height:200px;
}

/* RIGHT SIDE */
.right{
    flex:1;
}

button{
    padding:8px;
    margin-top:10px;
}

/* MOBILE */
@media(max-width:768px){
    .box{
        flex-direction:column;
        align-items:center;
        text-align:center;
    }

    img{
        width:100%;
        height:auto;
    }
}
</style>
</head>

<body>

<div class="navbar">
<a href="{% url 'shop' %}" style="color:white;">Home</a>
</div>

<div class="container">

<div class="box">
<img src="{% static 'myapp/images/Necklace.png' %}">
<div class="right">
<h3>Gold Necklace</h3>
<p>Elegant gold-plated necklace</p>
<p><b>₹2499</b></p>

<a href="{% url 'payment' %}">
<button>Buy Now</button>
</a>
</div>
</div>

</div>

</body>
</html>

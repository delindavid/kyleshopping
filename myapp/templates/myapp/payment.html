{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

<style>
body{
    font-family: Arial;
    background-color: #C1D8C3;
}

.container{
    width: 400px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
}

h2{
    text-align: center;
}

input, select{
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button{
    width: 100%;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">
    <h2>Payment Details</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Card Holder Name" required>

        <input type="text" name="card" placeholder="Card Number" required>

        <input type="text" name="expiry" placeholder="MM/YY" required>

        <input type="password" name="cvv" placeholder="CVV" required>

        <select name="method">
            <option>Credit Card</option>
            <option>Debit Card</option>
            <option>UPI</option>
        </select>

        <button type="submit">Pay Now</button>
    </form>
</div>

</body>
</html>
